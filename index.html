        // Retrieve API Key dynamically from local storage or fallback to compiler injection

        async function fetchGemini(systemInstruction, userPrompt) {
            const apiKey = retrieveApiKey();
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: userPrompt }] }],
                systemInstruction: {
                    parts: [{ text: systemInstruction }]
                }
            };

            let delay = 1000;
            const maxRetries = 3;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP status error: ${response.status}`);
                    }
                    
                    const result = await response.json();
                    const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (aiText) return aiText;
                    throw new Error("Received empty response from the generative model.");
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }

        // Helper to fetch structured JSON schemas from Gemini
        async function fetchGeminiStructured(systemInstruction, userPrompt, schema) {
            const apiKey = retrieveApiKey();
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: userPrompt }] }],
                systemInstruction: {
                    parts: [{ text: systemInstruction }]
                },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: schema
                }
            };

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            if (!response.ok) throw new Error(`Structured API error: ${response.status}`);
            const result = await response.json();
            const jsonText = result.candidates?.[0]?.content?.parts?.[0]?.text;
            if (jsonText) return JSON.parse(jsonText);
            throw new Error("Empty structured JSON response.");
        }

        // Helper to generate posters/artwork via Google Imagen
        async function fetchImagen(prompt) {
            const apiKey = retrieveApiKey();
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            const payload = {
                instances: [{ prompt: prompt }],
                parameters: { "sampleCount": 1 }
            };

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error(`Imagen API error: ${response.status}`);
            const result = await response.json();
            const base64Encoded = result.predictions?.[0]?.bytesBase64Encoded;
            if (base64Encoded) {
                return `data:image/png;base64,${base64Encoded}`;
            }
            throw new Error("Could not extract synthesized artwork.");
        }

        // Helper to generate Voice TTS (Text to Speech) using gemini-2.5-flash-preview-tts
        async function fetchTTS(textToSpeak) {
            const apiKey = retrieveApiKey();
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{
                    parts: [{ text: textToSpeak }]
                }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                        voiceConfig: {
                            prebuiltVoiceConfig: { voiceName: "Puck" } // Upbeat, friendly tone
                        }
                    }
                }
            };

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error(`TTS API error: ${response.status}`);
            const result = await response.json();
            const part = result?.candidates?.[0]?.content?.parts?.[0];
            const audioData = part?.inlineData?.data;
            const mimeType = part?.inlineData?.mimeType;

            if (audioData && mimeType && mimeType.startsWith("audio/")) {
                const sampleRateMatch = mimeType.match(/rate=(\d+)/);
                const sampleRate = sampleRateMatch ? parseInt(sampleRateMatch[1], 10) : 24000;
                const pcmBuffer = base64ToArrayBuffer(audioData);
                const pcm16 = new Int16Array(pcmBuffer);
                const wavBlob = pcmToWav(pcm16, sampleRate);
                return URL.createObjectURL(wavBlob);
            }
            throw new Error("No synthesized sound stream returned.");
        }

        function base64ToArrayBuffer(base64) {
            const binaryString = window.atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

        function pcmToWav(pcm16, sampleRate) {
            const buffer = new ArrayBuffer(44 + pcm16.length * 2);
            const view = new DataView(buffer);

            // "RIFF"
            view.setUint8(0, 0x52); view.setUint8(1, 0x49); view.setUint8(2, 0x46); view.setUint8(3, 0x46);
            view.setUint32(4, 36 + pcm16.length * 2, true);
            // "WAVE"
            view.setUint8(8, 0x57); view.setUint8(9, 0x41); view.setUint8(10, 0x56); view.setUint8(11, 0x45);
            // "fmt "
            view.setUint8(12, 0x66); view.setUint8(13, 0x6d); view.setUint8(14, 0x74); view.setUint8(15, 0x20);
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            // "data"
            view.setUint8(36, 0x64); view.setUint8(37, 0x61); view.setUint8(38, 0x74); view.setUint8(39, 0x61);
            view.setUint32(40, pcm16.length * 2, true);

            for (let i = 0; i < pcm16.length; i++) {
                view.setInt16(44 + i * 2, pcm16[i], true);
            }

            return new Blob([view], { type: 'audio/wav' });
        }

        // Play Synthesized Voice Output
        async function playVoiceOver(text, buttonId) {
            const btn = document.getElementById(buttonId);
            const originalHTML = btn.innerHTML;
            
            try {
                if (activeVoiceAudio) {
                    activeVoiceAudio.pause();
                    activeVoiceAudio = null;
                }
                
                btn.innerHTML = `<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> Speaking...`;
                lucide.createIcons();
                
                const audioUrl = await fetchTTS(text);
                activeVoiceAudio = new Audio(audioUrl);
                
                activeVoiceAudio.onended = () => {
                    btn.innerHTML = originalHTML;
                    lucide.createIcons();
                };
                
                await activeVoiceAudio.play();
                showNotification("Voice playback active!", "success");
            } catch (err) {
                console.error(err);
                showNotification("Could not load ALIF AI voice engine.", "error");
                btn.innerHTML = originalHTML;
                lucide.createIcons();
            }
        }

        function downloadStudyGuidePDF() {
            if (!activeStudyGuide) return;
            try {
                const doc = new jsPDF({
                    orientation: 'portrait',
                    unit: 'px',
                    format: 'a4'
                });

                doc.setFillColor(13, 15, 18); 
                doc.rect(0, 0, doc.internal.pageSize.width, doc.internal.pageSize.height, 'F');

                // Border
                doc.setDrawColor(99, 102, 241);
                doc.setLineWidth(2);
                doc.rect(15, 15, doc.internal.pageSize.width - 30, doc.internal.pageSize.height - 30);

                doc.setTextColor(255, 255, 255);
                doc.setFont("Helvetica", "bold");
                doc.setFontSize(18);
                doc.text("ALIF AI MASTER STUDY GUIDE", doc.internal.pageSize.width / 2, 45, { align: "center" });

                doc.setTextColor(129, 140, 248);
                doc.setFontSize(14);
                doc.text(activeStudyGuide.topic.toUpperCase(), doc.internal.pageSize.width / 2, 65, { align: "center" });

                // Intro
                doc.setTextColor(203, 213, 225);
                doc.setFontSize(10);
                doc.setFont("Helvetica", "normal");
                
                const introSplit = doc.splitTextToSize(activeStudyGuide.introduction, doc.internal.pageSize.width - 60);
                doc.text(introSplit, 30, 90);

                let cursorY = 90 + (introSplit.length * 12) + 20;

                // Concepts
                doc.setTextColor(251, 191, 36);
                doc.setFont("Helvetica", "bold");
                doc.setFontSize(12);
                doc.text("KEY CONCEPTUAL BREAKDOWN:", 30, cursorY);
                cursorY += 15;

                activeStudyGuide.keyConcepts.forEach(kc => {
                    if (cursorY > doc.internal.pageSize.height - 50) {
                        doc.addPage();
                        doc.setFillColor(13, 15, 18);
                        doc.rect(0, 0, doc.internal.pageSize.width, doc.internal.pageSize.height, 'F');
                        doc.setDrawColor(99, 102, 241);
                        doc.setLineWidth(2);
                        doc.rect(15, 15, doc.internal.pageSize.width - 30, doc.internal.pageSize.height - 30);
                        cursorY = 40;
                    }
                    doc.setTextColor(147, 51, 234);
                    doc.setFont("Helvetica", "bold");
                    doc.setFontSize(10);
                    doc.text(`• ${kc.conceptName}:`, 35, cursorY);
                    cursorY += 12;

                    doc.setTextColor(226, 232, 240);
                    doc.setFont("Helvetica", "normal");
                    const explanationSplit = doc.splitTextToSize(kc.explanation, doc.internal.pageSize.width - 80);
                    doc.text(explanationSplit, 45, cursorY);
                    cursorY += (explanationSplit.length * 11) + 15;
                });

                // Summary
                if (cursorY > doc.internal.pageSize.height - 80) {
                    doc.addPage();
                    doc.setFillColor(13, 15, 18);
                    doc.rect(0, 0, doc.internal.pageSize.width, doc.internal.pageSize.height, 'F');
                    doc.setDrawColor(99, 102, 241);
                    doc.setLineWidth(2);
                    doc.rect(15, 15, doc.internal.pageSize.width - 30, doc.internal.pageSize.height - 30);
                    cursorY = 40;
                }
                doc.setTextColor(16, 185, 129);
                doc.setFont("Helvetica", "bold");
                doc.setFontSize(12);
                doc.text("EXECUTIVE TOPIC SUMMARY:", 30, cursorY);
                cursorY += 15;

                doc.setTextColor(203, 213, 225);
                doc.setFont("Helvetica", "normal");
                doc.setFontSize(9);
                const summarySplit = doc.splitTextToSize(activeStudyGuide.summary, doc.internal.pageSize.width - 60);
                doc.text(summarySplit, 30, cursorY);

                doc.save(`Alif_AI_Study_Guide_${activeStudyGuide.topic.replace(/\s+/g, '_')}.pdf`);
                showNotification("Study Guide PDF generated!", "success");
            } catch (err) {
                console.error(err);
                showNotification("Error generating PDF", "error");
            }
        }

            // Admin Rule

                if (loginPw === passwords.admin) {

                    currentUser = { name: 'Alif Administrator', id: 'admin', photo: 'https://api.dicebear.com/7.x/bottts/svg?seed=admin' };
                    transitionToDashboard();
                } else {
                    showNotification('Invalid Administrator Password!', 'error');

            } else {
                // Student Check
                const st = students.find(s => s.id === loginId);
                if (st) {
                    if (loginPw === passwords[st.id]) {
                        userRole = 'student';
                        currentUser = st;
                        transitionToDashboard();

            try {

                    orientation: 'landscape',

                // Dual Borders
                doc.setDrawColor(99, 102, 241); // indigo border
                doc.setLineWidth(2);
                doc.rect(10, 10, doc.internal.pageSize.width - 20, doc.internal.pageSize.height - 20);

                doc.setDrawColor(168, 85, 247); // purple inline border
                doc.setLineWidth(0.75);
                doc.rect(13, 13, doc.internal.pageSize.width - 26, doc.internal.pageSize.height - 26);

                doc.setTextColor(255, 255, 255);
                doc.setFont("Helvetica", "bold");

                doc.setFont("Helvetica", "bold");
                doc.text("ALIF CLASS UNION PORTAL ACADEMIC RECORDS", doc.internal.pageSize.width / 2, 53, { align: "center" });

                // Award statement
                doc.setTextColor(148, 163, 184); 
                doc.setFontSize(11);
                doc.setFont("Helvetica", "normal");
                doc.text("This certificate is proudly awarded to", doc.internal.pageSize.width / 2, 80, { align: "center" });

                // Student Name display
                doc.setTextColor(251, 191, 36); // Amber Gold
                doc.setFontSize(22);
                doc.setFont("Helvetica", "bold");
                doc.text(name, doc.internal.pageSize.width / 2, 102, { align: "center" });

                // Achievement Description context
                doc.setTextColor(226, 232, 240); 
                doc.setFontSize(10);
                doc.setFont("Helvetica", "normal");
                const detailText = `For achieving ${placementType} with a distinguished Grade '${grade}' in the competition`;

        // Create student
        function createNewStudentSubmit(e) {
            e.preventDefault();
            const idInput = document.getElementById('ast-id').value.trim();
            const nameInput = document.getElementById('ast-name').value.trim().toUpperCase();
            const emailInput = document.getElementById('ast-email').value.trim();
            const phoneInput = document.getElementById('ast-phone').value.trim();

            if (students.some(s => s.id === idInput)) {
                showNotification('Roll number/Admission number already registered!', 'error');
                return;
            }

            const newSt = {
                id: idInput,
                name: nameInput,
                email: emailInput || `${nameInput.toLowerCase().replace(/[^a-z0-9]/g, '')}@alifunion.com`,
                phone: phoneInput || '9876543210',
                photo: `https://api.dicebear.com/7.x/bottts/svg?seed=${nameInput}`
            };

            students.push(newSt);
            passwords[idInput] = '123456';
            classFunds[idInput] = 0;
            
            syncDatabase();
            showNotification('Student successfully admitted to directory!', 'success');
            renderActiveTabContent();
        }

        function launchEditStudentModal(id) {
            const st = students.find(s => s.id === id);
            if (!st) return;

            const modal = document.getElementById('modal-backdrop');
            const content = document.getElementById('modal-content');
            
            content.innerHTML = `
                <div class="space-y-4 text-xs">
                    <div class="flex justify-between items-center pb-2 border-b border-slate-900">
                        <h4 class="font-extrabold text-sm uppercase tracking-wider text-indigo-400">Modify Student Directory Fields</h4>
                        <button onclick="closeModal()" class="text-slate-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    <form id="edit-student-form" class="space-y-3" onsubmit="submitEditStudent(event, '${id}')">
                        <div>
                            <label class="block text-slate-400 mb-1">Admission / ID Number (Ad Number)</label>
                            <input type="text" id="est-id" value="${st.id}" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-white font-mono" required>
                        </div>
                        <div>
                            <label class="block text-slate-400 mb-1">Student Full Name</label>
                            <input type="text" id="est-name" value="${st.name}" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-white" required>
                        </div>
                        <div>
                            <label class="block text-slate-400 mb-1">Email Account</label>
                            <input type="email" id="est-email" value="${st.email}" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-white" required>
                        </div>
                        <div>
                            <label class="block text-slate-400 mb-1">Phone Number</label>
                            <input type="text" id="est-phone" value="${st.phone}" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-white" required>
                        </div>
                        <button type="submit" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 font-bold rounded-lg text-white uppercase tracking-wider text-[10px]">Save Changes</button>
                    </form>
                </div>
            `;
            modal.classList.replace('hidden', 'flex');
            lucide.createIcons();
        }

        function submitEditStudent(e, oldId) {
            e.preventDefault();
            const newId = document.getElementById('est-id').value.trim();
            const newName = document.getElementById('est-name').value.trim().toUpperCase();
            const newEmail = document.getElementById('est-email').value.trim();
            const newPhone = document.getElementById('est-phone').value.trim();

            if (newId !== oldId && students.some(s => s.id === newId)) {
                showNotification('Desired Roll/Admission Number is already used!', 'error');
                return;
            }

            const stIdx = students.findIndex(s => s.id === oldId);
            if (stIdx !== -1) {
                students[stIdx] = {
                    ...students[stIdx],
                    id: newId,
                    name: newName,
                    email: newEmail,
                    phone: newPhone
                };

                // Migrate associated wallets and passwords if roll changes
                if (newId !== oldId) {
                    classFunds[newId] = classFunds[oldId] || 0;
                    delete classFunds[oldId];
                    passwords[newId] = passwords[oldId] || '123456';
                    delete passwords[oldId];
                }
            }

            syncDatabase();
            closeModal();
            showNotification('Student information fields modified successfully!', 'success');
            renderActiveTabContent();
        }

        async function deleteStudent(id) {
            const proceed = await askConfirmation('Delete this student entry permanently from the Alif Class Union directory?');
            if (proceed) {
                students = students.filter(s => s.id !== id);
                delete classFunds[id];
                delete passwords[id];
                syncDatabase();
                showNotification('Student entry removed.', 'success');
                renderActiveTabContent();
            }
        }

        function closeModal() {
            document.getElementById('modal-backdrop').classList.replace('flex', 'hidden');
        }

        // Image upload simulator
        function triggerImageUploadSim(e, id) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    students = students.map(st => {
                        if (st.id === id) {
                            return { ...st, photo: reader.result };
                        }
                        return st;
                    });
                    if (currentUser && currentUser.id === id) {
                        currentUser.photo = reader.result;
                        document.getElementById('user-avatar').src = reader.result;
                    }
                    syncDatabase();
                    showNotification('Roster picture updated!', 'success');
                    renderActiveTabContent();
                };
                reader.readAsDataURL(file);
            }
        }

        // Admin Fund Operations submit
        function submitFundOperation(e) {
            e.preventDefault();
            const studentId = document.getElementById('fund-student').value;
            const action = document.getElementById('fund-action').value;
            const reason = document.getElementById('fund-reason').value.trim();
            const method = document.getElementById('fund-method').value;
            const amount = parseFloat(document.getElementById('fund-amount').value);
            const usthad = document.getElementById('usthad-name').value.trim();

            if (!studentId || isNaN(amount) || amount <= 0) {
                showNotification('Invalid operation parameters!', 'error');
                return;
            }

            const currentVal = classFunds[studentId] || 0;
            let resultVal = currentVal;

            if (action === 'add') {
                resultVal += amount;
            } else {
                if (currentVal < amount) {
                    showNotification('Insufficient wallet funds available for withdrawal!', 'error');
                    return;
                }
                resultVal -= amount;
            }

            classFunds[studentId] = resultVal;

            // Log Transaction History
            const studentObj = students.find(s => s.id === studentId);
            fundHistory.push({
                studentId,
                studentName: studentObj ? studentObj.name : "Unknown Student",
                action,
                reason,
                method,
                usthad: method === 'cash' ? (usthad || 'Usthad Ibrahim') : '',
                amount,
                date: new Date().toLocaleDateString('en-US')
            });

            syncDatabase();
            showNotification('Financial pool transaction recorded successfully!', 'success');
            document.getElementById('fund-operation-form').reset();
            document.getElementById('usthad-container').classList.add('hidden');
            renderActiveTabContent();
        }

        function addContactSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('con-name').value.trim();
            const phone = document.getElementById('con-phone').value.trim();
            const email = document.getElementById('con-email').value.trim();
            const role = document.getElementById('con-role').value.trim();

            const newCon = {
                id: Date.now().toString(),
                name,
                phone,
                email: email || 'advisor@alifweb.com',
                role
            };

            adminContacts.push(newCon);
            syncDatabase();
            document.getElementById('add-contact-form').reset();
            showNotification('Contact successfully added to the Alif Directory!', 'success');
            renderActiveTabContent();
        }

        // Program Action Submit
        function createNewProgramSubmit(e) {
            e.preventDefault();
            const title = document.getElementById('prog-title').value.trim();
            const date = document.getElementById('prog-date').value;
            const desc = document.getElementById('prog-desc').value.trim();

            programs.push({
                id: Date.now().toString(),
                title,
                date,
                desc
            });

            syncDatabase();
            document.getElementById('program-event-form').reset();
            showNotification('New program event deployed!', 'success');
            renderActiveTabContent();
        }

        async function deleteProgram(id) {
            const proceed = await askConfirmation('Are you sure you want to purge this program event?');
            if (proceed) {
                programs = programs.filter(p => p.id !== id);
                results = results.filter(r => r.programId !== id);
                syncDatabase();
                showNotification('Program calendar purged.', 'success');
                renderActiveTabContent();
            }
        }

        function launchEditProgramModal(id) {
            const p = programs.find(item => item.id === id);
            if (!p) return;

            const modal = document.getElementById('modal-backdrop');
            const content = document.getElementById('modal-content');

            content.innerHTML = `
                <div class="space-y-4 text-xs">
                    <div class="flex justify-between items-center pb-2 border-b border-slate-900">
                        <h4 class="font-extrabold text-sm uppercase tracking-wider text-indigo-400">Modify Event Details</h4>
                        <button onclick="closeModal()" class="text-slate-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    <form id="edit-program-form" class="space-y-3" onsubmit="submitEditProgram(event, '${id}')">
                        <div>
                            <label class="block text-slate-400 mb-1">Title</label>
                            <input type="text" id="eprog-title" value="${p.title}" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-white" required>
                        </div>
                        <div>
                            <label class="block text-slate-400 mb-1">Date</label>
                            <input type="date" id="eprog-date" value="${p.date}" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-white" required>
                        </div>
                        <div>
                            <label class="block text-slate-400 mb-1">Description</label>
                            <textarea id="eprog-desc" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-white h-24" required>${p.desc}</textarea>
                        </div>
                        <button type="submit" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 font-bold text-white uppercase tracking-wider text-[10px]">Save Changes</button>
                    </form>
                </div>
            `;
            modal.classList.replace('hidden', 'flex');
            lucide.createIcons();
        }

        function submitEditProgram(e, id) {
            e.preventDefault();
            programs = programs.map(p => {
                if (p.id === id) {
                    return {
                        ...p,
                        title: document.getElementById('eprog-title').value.trim(),
                        date: document.getElementById('eprog-date').value,
                        desc: document.getElementById('eprog-desc').value.trim()
                    };
                }
                return p;
            });
            syncDatabase();
            closeModal();
            showNotification('Program event successfully modified!', 'success');
            renderActiveTabContent();
        }

        // Dynamic result handler (Handles Grade-only and Places-with-grades toggles)
        function submitResultPublish(e) {
            e.preventDefault();
            const formType = document.getElementById('res-form-type').value;
            const programId = document.getElementById('res-program').value;
            
            const progObj = programs.find(p => p.id === programId);
            if (!progObj) {
                showNotification('Invalid Program selected!', 'error');
                return;
            }

            if (formType === 'places') {
                const st1 = document.getElementById('res-st-1st').value;
                const g1 = document.getElementById('res-grade-1st').value;

                const st2 = document.getElementById('res-st-2nd').value;
                const g2 = document.getElementById('res-grade-2nd').value;

                const st3 = document.getElementById('res-st-3nd').value;
                const g3 = document.getElementById('res-grade-3nd').value;

                if (!st1 || !st2 || !st3) {
                    showNotification('Please assign all three Places!', 'error');
                    return;
                }

                const s1Obj = students.find(s => s.id === st1);
                const s2Obj = students.find(s => s.id === st2);
                const s3Obj = students.find(s => s.id === st3);

                results.push({
                    id: Date.now().toString(),
                    programId,
                    programTitle: progObj.title,
                    resultType: 'places',
                    first: { roll: st1, name: s1Obj ? s1Obj.name : 'Unknown', grade: g1 },
                    second: { roll: st2, name: s2Obj ? s2Obj.name : 'Unknown', grade: g2 },
                    third: { roll: st3, name: s3Obj ? s3Obj.name : 'Unknown', grade: g3 }
                });
            } else {
                const stOnly = document.getElementById('res-st-only').value;
                const gradeOnly = document.getElementById('res-grade-only').value;

                if (!stOnly) {
                    showNotification('Please select a student!', 'error');
                    return;
                }

                const sObj = students.find(s => s.id === stOnly);

                results.push({
                    id: Date.now().toString(),
                    programId,
                    programTitle: progObj.title,
                    resultType: 'grade',
                    student: { roll: stOnly, name: sObj ? sObj.name : 'Unknown', grade: gradeOnly }
                });
            }

            syncDatabase();
            document.getElementById('result-publish-form').reset();
            showNotification('Results published successfully!', 'success');
            renderActiveTabContent();
        }

        function deleteResult(id) {
            askConfirmation('Remove this result standing?').then(proceed => {
                if (proceed) {
                    results = results.filter(r => r.id !== id);
                    syncDatabase();
                    showNotification('Grade standing removed from achievement list.', 'success');
                    renderActiveTabContent();
                }
            });
        }

        function postNewAnnouncement(e) {
            e.preventDefault();
            const title = document.getElementById('ann-title').value.trim();
            const message = document.getElementById('ann-msg').value.trim();
            let dateVal = document.getElementById('ann-date').value;

            if (!dateVal) {
                dateVal = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            } else {
                dateVal = new Date(dateVal).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            }

            notifications.unshift({
                id: Date.now().toString(),
                title,
                message,
                date: dateVal
            });

            syncDatabase();
            showNotification('Announcement posted successfully!', 'success');
            renderActiveTabContent();
        }

        function deleteNotification(id) {
            askConfirmation('Permanently delete this announcement?').then(proceed => {
                if (proceed) {
                    notifications = notifications.filter(not => not.id !== id);
                    syncDatabase();
                    showNotification('Announcement notice deleted.', 'success');
                    renderActiveTabContent();
                }
            });
        }

        // Credentials updating
        function submitPasswordChange(e) {
            e.preventDefault();
            const currentId = currentUser.id;
            const oldPw = document.getElementById('pw-old').value;
            const newPw = document.getElementById('pw-new').value;
            const confirmPw = document.getElementById('pw-confirm').value;

            if (oldPw !== passwords[currentId]) {
                showNotification('The existing password entered is invalid!', 'error');
                return;
            }
            if (newPw.length < 4) {
                showNotification('New password should be at least 4 characters long!', 'error');
                return;
            }
            if (newPw !== confirmPw) {
                showNotification('Passwords do not match!', 'error');
                return;
            }

            passwords[currentId] = newPw;
            syncDatabase();
            document.getElementById('change-password-form').reset();
            showNotification('Credential password modified successfully!', 'success');
        }

        // Gemini chatbot integration
        async function submitGeminiAIChatQuery(e) {
            e.preventDefault();
            const textInput = document.getElementById('ai-chat-input');
            const userText = textInput.value.trim();
            if (!userText) return;

            const chatConsole = document.getElementById('ai-chat-output');
            
            // Append User Chat Bubble
            const userBubble = document.createElement('div');
            userBubble.className = "p-3 rounded-2xl bg-slate-900 text-slate-100 max-w-[85%] ml-auto text-right font-semibold";
            userBubble.innerText = userText;
            chatConsole.appendChild(userBubble);
            textInput.value = '';
            
            chatConsole.scrollTop = chatConsole.scrollHeight;

            // Loading state
            const loaderBubble = document.createElement('div');
            loaderBubble.className = "p-3 rounded-2xl bg-indigo-950/20 border border-indigo-900/40 text-indigo-300 max-w-[85%] flex items-center gap-2";
            loaderBubble.innerHTML = `<i data-lucide="loader" class="w-4 h-4 animate-spin"></i><span>Analyzing workspace...</span>`;
            chatConsole.appendChild(loaderBubble);
            lucide.createIcons();
            chatConsole.scrollTop = chatConsole.scrollHeight;

            // Generate context parameters
            const totalClassFund = Object.values(classFunds).reduce((a, b) => a + Number(b), 0);
            const contextDataset = {
                studentsCount: students.length,
                totalClassFundINR: totalClassFund,
                activeGradesCount: results.length,
                activeAnnouncementsCount: notifications.length,
                liveAnnouncements: notifications.map(n => ({ title: n.title, message: n.message, date: n.date }))
            };

            const systemPrompt = `You are "ALIF AI Assistant", embedded in the ALIF CLASS UNION WEB dashboard. 
            Write beautiful, premium, structured, and informative responses or reports entirely in English. Use currency format ₹ (INR). 
            Here is the live dashboard summary datasets: ${JSON.stringify(contextDataset)}. 
            IMPORTANT REQUISITE: If the student asks about active announcements, notifications, or notices, refer to 'liveAnnouncements' and explain them thoroughly and clearly. If 'liveAnnouncements' is empty, kindly state that no official notices are currently published. Always remain supportive, professional, and precise.`;

            try {
                const aiResponse = await fetchGemini(systemPrompt, userText);
                loaderBubble.remove();
                
                const replyBubble = document.createElement('div');
                replyBubble.className = "p-3 rounded-2xl bg-indigo-950/20 border border-indigo-900/40 text-indigo-300 max-w-[85%] leading-relaxed";
                replyBubble.innerText = aiResponse;
                chatConsole.appendChild(replyBubble);

            } catch (err) {
                console.error(err);
                loaderBubble.remove();
                const errBubble = document.createElement('div');
                errBubble.className = "p-3 rounded-2xl bg-rose-950/20 border border-rose-900/40 text-rose-400 max-w-[85%]";
                errBubble.innerText = "Error establishing secure connection with ALIF AI. Try again later.";
                chatConsole.appendChild(errBubble);
            }
            
            chatConsole.scrollTop = chatConsole.scrollHeight;
        }
    </script>
